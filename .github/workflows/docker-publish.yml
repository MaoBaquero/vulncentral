# Publica imágenes en Docker Hub (namespace maurobaquero/vulncentral-*).
# Requiere secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN.
# Opcional: variable de repositorio VITE_API_BASE_URL (build del frontend); ver docs/DockerHubPL.md
name: Publish Docker Hub

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

env:
  IMAGE_PREFIX: maurobaquero/vulncentral
  # Solo consume el frontend; las imágenes Python ignoran el ARG.
  VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL != '' && vars.VITE_API_BASE_URL || 'http://localhost:8000' }}

jobs:
  publish:
    name: Build and push (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-gateway
            context: .
            file: services/api-gateway/Dockerfile
          - service: worker
            context: .
            file: services/worker/Dockerfile
          - service: frontend
            context: ./services/frontend
            file: ./services/frontend/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          build-args: |
            VITE_API_BASE_URL=${{ env.VITE_API_BASE_URL }}
          cache-from: type=gha,scope=vulncentral-${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=vulncentral-${{ matrix.service }}
